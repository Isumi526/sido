name: Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/gas/**'
      - 'apps/liff/**'

jobs:
  # ── GAS デプロイ ──────────────────────────────────────────────
  deploy-gas:
    name: Deploy GAS (${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set GAS script ID
        working-directory: apps/gas
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            SCRIPT_ID="${{ secrets.GAS_SCRIPT_ID_PROD }}"
          else
            SCRIPT_ID="${{ secrets.GAS_SCRIPT_ID_DEV }}"
          fi
          echo "{\"scriptId\":\"$SCRIPT_ID\",\"rootDir\":\".\"}" > .clasp.json

      - name: Push to GAS
        working-directory: apps/gas
        run: clasp push --force

  # ── Vercel デプロイ（main のみ）─────────────────────────────────
  deploy-vercel:
    name: Deploy Vercel (production)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        working-directory: apps/liff
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
