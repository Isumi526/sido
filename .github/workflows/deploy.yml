name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - dev
      - develop
    paths:
      - 'apps/gas/**'
      - 'apps/liff/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ── Edge Functions デプロイ ───────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Edge Functions (${{ github.ref_name }})
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions (dev → test prefix)
        if: github.ref_name == 'dev'
        run: |
          FUNCTIONS="submit-report notify-edit notify-error get-master"
          for fn in $FUNCTIONS; do
            cp -r supabase/functions/$fn supabase/functions/test-$fn
            supabase functions deploy test-$fn \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt
            rm -rf supabase/functions/test-$fn
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions (main → production)
        if: github.ref_name == 'main'
        run: |
          # supabase/functions/ 配下の実関数を全てデプロイ（_shared と test-* は除外）。
          # ※ 固定リストだと新規関数のデプロイ漏れが起きるため全量デプロイにする。
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [ "$fn" = "_shared" ] && continue
            case "$fn" in test-*) continue;; esac
            echo "deploying $fn ..."
            supabase functions deploy "$fn" \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Vercel デプロイ（main のみ）─────────────────────────────────
  deploy-vercel:
    name: Deploy Vercel (production)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        working-directory: apps/liff
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
